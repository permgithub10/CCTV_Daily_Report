<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CCTV & Access Control System</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ===== App Shell ===== -->
  <div id="app">

    <!-- Top Header -->
    <header id="topHeader">
      <div class="header-inner">
        <span id="headerTitle">📷 แบบบันทึกความผิดปกติ CCTV</span>
      </div>
    </header>

    <!-- Pages -->
    <main id="mainContent">

      <!-- ========== PAGE 1: CCTV Report ========== -->
      <div class="page active" id="page-cctv">

        <section class="form-section card">
          <h2 class="section-title">📝 บันทึกข้อมูล</h2>
          <form id="cctvForm">

            <div class="form-row two-col">
              <div class="form-group">
                <label>📅 วันที่ <span class="req">*</span></label>
                <div class="date-wrapper">
                  <input type="text" id="c_date" placeholder="วว-ดด-ปปปป" maxlength="10" required autocomplete="off" readonly style="cursor:pointer;" onclick="openDatePicker()" />
                  <input type="date" id="c_date_picker" style="position:absolute;opacity:0;pointer-events:none;width:0;height:0;" />
                  <span class="date-cal-icon" onclick="openDatePicker()">📅</span>
                </div>
              </div>
              <div class="form-group">
                <label>🎥 Cam ID <span class="req">*</span></label>
                <input type="text" id="c_camId" required />
              </div>
            </div>

            <div class="form-group">
              <label>📍 โซน/พื้นที่ติดตั้ง <span class="req">*</span></label>
              <input type="text" id="c_zone" required />
            </div>

            <div class="form-group">
              <label>⚠️ อาการที่พบ <span class="req">*</span></label>
              <div class="checkbox-row">
                <input type="checkbox" id="c_novideo" onchange="applyNoVideoText()" />
                <label for="c_novideo" class="checkbox-label">No Video</label>
              </div>
              <textarea id="c_issue" rows="3" required placeholder="อธิบายอาการที่พบ..."></textarea>
            </div>

            <div class="form-group">
              <label>🖼️ รูปภาพ — อาการที่พบ</label>
              <input type="file" id="c_image1"     accept="image/*"                   hidden />
              <input type="file" id="c_image1_cam" accept="image/*" capture="environment" hidden />
              <div class="upload-btn-row">
                <button type="button" class="btn btn-upload" onclick="document.getElementById('c_image1').click()">🖼️ เลือกรูป</button>
                <button type="button" class="btn btn-upload" onclick="document.getElementById('c_image1_cam').click()">📷 เปิดกล้อง</button>
              </div>
              <div class="preview-container" id="preview1"></div>
            </div>

            <div class="form-group">
              <label>🔧 การดำเนินการแก้ไข <span class="req">*</span></label>
              <div class="checkbox-row">
                <input type="checkbox" id="c_restart" onchange="applyRestartText()" />
                <label for="c_restart" class="checkbox-label">สั่ง Restart ผ่าน Web UI</label>
              </div>
              <textarea id="c_action" rows="3" required placeholder="อธิบายการแก้ไข..."></textarea>
            </div>

            <div class="form-row two-col">
              <div class="form-group">
                <label>📊 สถานะ <span class="req">*</span></label>
                <select id="c_status" required>
                  <option value="">-- เลือกสถานะ --</option>
                  <option value="รอดำเนินการ">⏳ รอดำเนินการ</option>
                  <option value="กำลังดำเนินการ">🔄 กำลังดำเนินการ</option>
                  <option value="เสร็จสิ้น">✅ เสร็จสิ้น</option>
                </select>
              </div>
              <div class="form-group">
                <label>📅 วันที่เสร็จ</label>
                <div class="date-wrapper">
                  <input type="text" id="c_doneDate" placeholder="วว-ดด-ปปปป" maxlength="10" autocomplete="off" readonly style="cursor:pointer;" onclick="openPicker('c_doneDate','c_doneDate_picker')" />
                  <input type="date" id="c_doneDate_picker" style="position:absolute;opacity:0;pointer-events:none;width:0;height:0;" />
                  <span class="date-cal-icon" onclick="openPicker('c_doneDate','c_doneDate_picker')">📅</span>
                </div>
              </div>
            </div>

            <div class="form-row two-col">
              <div class="form-group">
                <label>📝 หมายเหตุ</label>
                <input type="text" id="c_note" placeholder="(ถ้ามี)" />
              </div>
            </div>

            <div class="form-group">
              <label>🖼️ รูปภาพ — หลังแก้ไข</label>
              <!-- hidden inputs -->
              <input type="file" id="c_image2"      accept="image/*"        hidden />
              <input type="file" id="c_image2_cam"  accept="image/*" capture="environment" hidden />
              <div class="upload-btn-row">
                <button type="button" class="btn btn-upload" onclick="document.getElementById('c_image2').click()">🖼️ เลือกรูป</button>
                <button type="button" class="btn btn-upload" onclick="document.getElementById('c_image2_cam').click()">📷 เปิดกล้อง</button>
              </div>
              <div class="preview-container" id="preview2"></div>
            </div>

            <div class="form-actions">
              <button type="submit" class="btn btn-primary">💾 บันทึกข้อมูล</button>
              <button type="reset" class="btn btn-ghost" onclick="resetCctvForm()">🔄 ล้างฟอร์ม</button>
            </div>
            <div id="cctvMsg" class="msg-box"></div>
          </form>
        </section>

      </div>

      <!-- ========== PAGE 2: Job Request ========== -->
      <div class="page" id="page-job">

        <section class="form-section card">
          <h2 class="section-title">📝 บันทึกรับแจ้งงาน</h2>
          <form id="jobForm">

            <div class="form-row two-col">
              <div class="form-group">
                <label>📅 วันที่ <span class="req">*</span></label>
                <div class="date-wrapper">
                  <input type="text" id="j_date" placeholder="วว-ดด-ปปปป" maxlength="10" required autocomplete="off" readonly style="cursor:pointer;" onclick="openPicker('j_date','j_date_picker')" />
                  <input type="date" id="j_date_picker" style="position:absolute;opacity:0;pointer-events:none;width:0;height:0;" />
                  <span class="date-cal-icon" onclick="openPicker('j_date','j_date_picker')">📅</span>
                </div>
              </div>
              <div class="form-group">
                <label>🔖 เลขที่ใบแจ้ง <span class="req">*</span></label>
                <input type="text" id="j_jobNo" required />
              </div>
            </div>

            <div class="form-row two-col">
              <div class="form-group">
                <label>🏷️ ประเภทงาน <span class="req">*</span></label>
                <select id="j_jobType" required>
                  <option value="">-- เลือกประเภท --</option>
                  <option value="CCTV">📷 CCTV</option>
                  <option value="Access Control">🚪 Access Control</option>
                  <option value="อื่นๆ">🔧 อื่นๆ</option>
                </select>
              </div>
              <div class="form-group">
                <label>📍 สถานที่ <span class="req">*</span></label>
                <input type="text" id="j_location" required />
              </div>
            </div>

            <div class="form-group">
              <label>📄 รายละเอียด <span class="req">*</span></label>
              <textarea id="j_detail" rows="3" required placeholder="รายละเอียดงานที่แจ้ง..."></textarea>
            </div>

            <div class="form-group">
              <label>🖼️ รูปภาพ</label>
              <input type="file" id="j_image"     accept="image/*"                    hidden />
              <input type="file" id="j_image_cam" accept="image/*" capture="environment" hidden />
              <div class="upload-btn-row">
                <button type="button" class="btn btn-upload" onclick="document.getElementById('j_image').click()">🖼️ เลือกรูป</button>
                <button type="button" class="btn btn-upload" onclick="document.getElementById('j_image_cam').click()">📷 เปิดกล้อง</button>
              </div>
              <div class="preview-container" id="j_preview"></div>
            </div>

            <div class="form-group">
              <label>🔧 การดำเนินการแก้ไข</label>
              <textarea id="j_action" rows="3" placeholder="อธิบายการแก้ไข..."></textarea>
            </div>

            <div class="form-row two-col">
              <div class="form-group">
                <label>📊 สถานะ <span class="req">*</span></label>
                <select id="j_status" required>
                  <option value="">-- เลือกสถานะ --</option>
                  <option value="รอดำเนินการ">⏳ รอดำเนินการ</option>
                  <option value="กำลังดำเนินการ">🔄 กำลังดำเนินการ</option>
                  <option value="เสร็จสิ้น">✅ เสร็จสิ้น</option>
                </select>
              </div>
              <div class="form-group">
                <label>📅 วันที่เสร็จ</label>
                <div class="date-wrapper">
                  <input type="text" id="j_doneDate" placeholder="วว-ดด-ปปปป" maxlength="10" autocomplete="off" readonly style="cursor:pointer;" onclick="openPicker('j_doneDate','j_doneDate_picker')" />
                  <input type="date" id="j_doneDate_picker" style="position:absolute;opacity:0;pointer-events:none;width:0;height:0;" />
                  <span class="date-cal-icon" onclick="openPicker('j_doneDate','j_doneDate_picker')">📅</span>
                </div>
              </div>
            </div>

            <div class="form-group">
              <label>📝 หมายเหตุ</label>
              <input type="text" id="j_note" placeholder="(ถ้ามี)" />
            </div>

            <div class="form-actions">
              <button type="submit" class="btn btn-primary">💾 บันทึกข้อมูล</button>
              <button type="reset" class="btn btn-ghost" onclick="resetJobForm()">🔄 ล้างฟอร์ม</button>
            </div>
            <div id="jobMsg" class="msg-box"></div>
          </form>
        </section>

      </div>

      <!-- ========== PAGE 3: Dashboard ========== -->
      <div class="page" id="page-dashboard">
        <section class="card">
          <div class="dash-tabs">
            <button class="dash-tab active" onclick="switchDash('cctv',this)">📷 CCTV Report</button>
            <button class="dash-tab" onclick="switchDash('job',this)">📋 Job Request</button>
          </div>

          <!-- CCTV Dashboard -->
          <div id="dash-cctv">
            <div class="stat-grid" id="cctvStats"></div>
            <div class="chart-row">
              <div class="chart-card">
                <h3>สถานะงาน</h3>
                <canvas id="cctvStatusChart"></canvas>
              </div>
              <div class="chart-card">
                <h3>รายการล่าสุด 5 รายการ</h3>
                <div id="cctvRecent"></div>
              </div>
            </div>
          </div>

          <!-- Job Dashboard -->
          <div id="dash-job" style="display:none">
            <div class="stat-grid" id="jobStats"></div>
            <div class="chart-row">
              <div class="chart-card">
                <h3>สถานะงาน</h3>
                <canvas id="jobStatusChart"></canvas>
              </div>
              <div class="chart-card">
                <h3>ประเภทงาน</h3>
                <canvas id="jobTypeChart"></canvas>
              </div>
            </div>
          </div>
        </section>
      </div>

      <!-- ========== PAGE 4: Admin ========== -->
      <div class="page" id="page-admin">

        <!-- Login Panel -->
        <div id="loginPanel" class="card login-card">
          <div class="login-icon">🔐</div>
          <h2>Admin Login</h2>
          <p class="login-sub">กรุณาเข้าสู่ระบบเพื่อจัดการข้อมูล</p>
          <div class="form-group">
            <label>Username</label>
            <input type="text" id="adminUser" placeholder="กรอก username" autocomplete="username"/>
          </div>
          <div class="form-group">
            <label>Password</label>
            <input type="password" id="adminPass" placeholder="กรอก password" autocomplete="current-password"/>
          </div>
          <button class="btn btn-primary btn-full" onclick="doLogin()">🔑 เข้าสู่ระบบ</button>
          <div id="loginMsg" class="msg-box"></div>
        </div>

        <!-- Admin Panel -->
        <div id="adminPanel" style="display:none">
          <div class="admin-toolbar card">
            <div class="admin-tabs">
              <button class="admin-tab active" onclick="switchAdminSheet('cctv',this)">📷 CCTV Report</button>
              <button class="admin-tab" onclick="switchAdminSheet('job',this)">📋 Job Request</button>
            </div>
            <button class="btn btn-sm btn-danger" onclick="doLogout()">🚪 ออกจากระบบ</button>
          </div>

          <section class="card">
            <div class="section-header">
              <h2 class="section-title" id="adminTableTitle">📷 CCTV Report</h2>
              <button class="btn btn-sm btn-outline" onclick="fetchAdminData()">🔄 รีเฟรช</button>
            </div>
            <div class="table-wrapper">
              <table id="adminTable">
                <thead id="adminThead"></thead>
                <tbody id="adminBody">
                  <tr><td class="tbl-loading" colspan="12">⏳ กำลังโหลด...</td></tr>
                </tbody>
              </table>
            </div>
          </section>
        </div>
      </div>

    </main>

    <!-- ===== Bottom Navigation ===== -->
    <nav id="bottomNav">
      <button class="nav-item active" onclick="switchPage('cctv',this)">
        <span class="nav-icon">📷</span>
        <span class="nav-label">CCTV</span>
      </button>
      <button class="nav-item" onclick="switchPage('job',this)">
        <span class="nav-icon">📋</span>
        <span class="nav-label">รับแจ้งงาน</span>
      </button>
      <button class="nav-item" onclick="switchPage('dashboard',this)">
        <span class="nav-icon">📊</span>
        <span class="nav-label">Dashboard</span>
      </button>
      <button class="nav-item" onclick="switchPage('admin',this)">
        <span class="nav-icon">🔐</span>
        <span class="nav-label">Admin</span>
      </button>
    </nav>
  </div>

  <!-- ===== Image Modal ===== -->
  <div id="imgModal" class="modal" onclick="if(event.target===this)this.style.display='none'">
    <span class="modal-close" onclick="document.getElementById('imgModal').style.display='none'">&times;</span>
    <img id="modalImg" class="modal-img" />
  </div>

  <!-- ===== Edit Modal ===== -->
  <div id="editModal" class="modal" onclick="if(event.target===this)closeEditModal()">
    <div class="modal-dialog" onclick="event.stopPropagation()">
      <div class="modal-header">
        <h3 id="editModalTitle">✏️ แก้ไขรายการ</h3>
        <span class="modal-close" onclick="closeEditModal()">&times;</span>
      </div>
      <div class="modal-body" id="editModalBody"></div>
      <div class="modal-footer">
        <button class="btn btn-primary" onclick="saveEdit()">💾 บันทึก</button>
        <button class="btn btn-ghost" onclick="closeEditModal()">ยกเลิก</button>
      </div>
    </div>
  </div>

  <!-- Chart.js CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
